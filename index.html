<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --border-color: #e5e5e5;
            --input-bg: #fafafa;
            --primary: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2.5rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .time-display {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 400;
            font-variant-numeric: tabular-nums;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
        }

        input[type="number"], input[type="date"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.75rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
            border-radius: 0;
            appearance: none;
        }

        input[type="number"]:focus, input[type="date"]:focus {
            border-color: var(--primary);
            background: #ffffff;
        }

        .routine-section {
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            margin-top: 1.5rem;
        }

        .routine-title {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .routine-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--input-bg);
            padding: 1rem;
            border: 1px solid var(--border-color);
        }

        .routine-grid-item label {
            text-align: center;
            font-size: 0.7rem;
            margin-bottom: 0.4rem;
            display: block;
        }

        .routine-grid-item input {
            padding: 0.4rem;
            text-align: center;
            font-size: 0.9rem;
            background: #ffffff;
            width: 100%;
        }

        .btn {
            background: var(--primary);
            color: #ffffff;
            border: 1px solid var(--primary);
            padding: 0.75rem;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #ffffff;
            color: var(--primary);
        }

        .error-message {
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
        }

        .result-card {
            margin-top: 2rem;
            border: 1px solid var(--border-color);
            padding: 2rem;
            animation: fadeIn 0.4s ease-out;
            display: none;
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .percentage-ring-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .attendance-status {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.5rem;
            color: var(--text-muted);
        }

        .missed-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .footer {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2rem;
        }

        .fw-600 { font-weight: 600; color: var(--primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }
            .card {
                padding: 1.5rem;
                border-left: none;
                border-right: none;
            }
            .routine-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 400px) {
            .routine-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>Attendance Predictor</h1>
            <p>Calculate attendance after missing future classes</p>
            <div class="time-display" id="clock">Loading current time...</div>
        </div>

        <div class="error-message" id="error-message"></div>

        <form id="attendance-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="total_classes">Total Classes</label>
                    <input type="number" id="total_classes" name="total_classes" required min="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="attended_classes">Attended</label>
                    <input type="number" id="attended_classes" name="attended_classes" required min="0" placeholder="0">
                </div>
            </div>

            <div class="routine-section">
                <div class="routine-title">Weekly Routine (Classes per day)</div>
                <div class="routine-grid">
                    <div class="routine-grid-item">
                        <label for="routine_monday">Mon</label>
                        <input type="number" id="routine_monday" name="routine_monday" min="0" required value="0">
                    </div>
                    <div class="routine-grid-item">
                        <label for="routine_tuesday">Tue</label>
                        <input type="number" id="routine_tuesday" name="routine_tuesday" min="0" required value="7">
                    </div>
                    <div class="routine-grid-item">
                        <label for="routine_wednesday">Wed</label>
                        <input type="number" id="routine_wednesday" name="routine_wednesday" min="0" required value="7">
                    </div>
                    <div class="routine-grid-item">
                        <label for="routine_thursday">Thu</label>
                        <input type="number" id="routine_thursday" name="routine_thursday" min="0" required value="4">
                    </div>
                    <div class="routine-grid-item">
                        <label for="routine_friday">Fri</label>
                        <input type="number" id="routine_friday" name="routine_friday" min="0" required value="7">
                    </div>
                    <div class="routine-grid-item">
                        <label for="routine_saturday">Sat</label>
                        <input type="number" id="routine_saturday" name="routine_saturday" min="0" required value="7">
                    </div>
                    <div class="routine-grid-item">
                        <label for="routine_sunday">Sun</label>
                        <input type="number" id="routine_sunday" name="routine_sunday" min="0" required value="0">
                    </div>
                </div>

                <div class="routine-title" style="margin-top: 2rem;">Leave Details</div>
                <div class="form-row" style="margin-bottom: 0;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="start_date">Start Date</label>
                        <input type="date" id="start_date" name="start_date" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="leave_days">Duration (Days)</label>
                        <input type="number" id="leave_days" name="leave_days" required min="1" placeholder="1">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 1.25rem; border-top: 1px dashed var(--border-color); padding-top: 1.25rem; margin-bottom: 0;">
                    <label for="attended_during_leave">Classes Attended During Leave (Optional)</label>
                    <input type="number" id="attended_during_leave" name="attended_during_leave" min="0" placeholder="0">
                </div>
            </div>

            <button type="submit" class="btn">Calculate</button>
        </form>

        <div class="result-card" id="result-card">
            <div class="percentage-ring-container">
                <div class="stat-label">Predicted Attendance</div>
                <div class="stat-value" id="new_percentage" style="font-size: 3.5rem; letter-spacing: -0.05em; margin: 0.5rem 0;">
                    0%
                </div>
                <div class="attendance-status" id="attendance_status">Zone</div>
            </div>

            <div class="result-stats">
                <div class="stat-box">
                    <div class="stat-label">Current</div>
                    <div class="stat-value" id="current_percentage">0%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Missed Classes</div>
                    <div class="stat-value" id="missed_classes">0</div>
                </div>
            </div>
            
            <div class="missed-info" id="missed_info">
                <!-- Content will be injected via JS -->
            </div>
        </div>
        
        <div class="footer">
            Made with love by aritra
        </div>
    </div>
</div>

<script>
    // Initialize default date
    const today = new Date();
    const formattedDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
    document.getElementById('start_date').value = formattedDate;

    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('clock').textContent = now.toLocaleDateString('en-US', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    const daysOfWeek = [
        'Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'
    ];

    document.getElementById('attendance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const errorMessageDiv = document.getElementById('error-message');
        const resultCardDiv = document.getElementById('result-card');
        
        errorMessageDiv.style.display = 'none';
        resultCardDiv.style.display = 'none';

        const total_classes = parseInt(document.getElementById('total_classes').value) || 0;
        const attended_classes = parseInt(document.getElementById('attended_classes').value) || 0;
        const leave_days = parseInt(document.getElementById('leave_days').value) || 0;
        const start_date_val = document.getElementById('start_date').value;
        const attended_during_leave = parseInt(document.getElementById('attended_during_leave').value) || 0;

        const routine = {
            'Monday': Math.max(0, parseInt(document.getElementById('routine_monday').value) || 0),
            'Tuesday': Math.max(0, parseInt(document.getElementById('routine_tuesday').value) || 0),
            'Wednesday': Math.max(0, parseInt(document.getElementById('routine_wednesday').value) || 0),
            'Thursday': Math.max(0, parseInt(document.getElementById('routine_thursday').value) || 0),
            'Friday': Math.max(0, parseInt(document.getElementById('routine_friday').value) || 0),
            'Saturday': Math.max(0, parseInt(document.getElementById('routine_saturday').value) || 0),
            'Sunday': Math.max(0, parseInt(document.getElementById('routine_sunday').value) || 0)
        };

        if (attended_classes > total_classes) {
            showError("Attended classes cannot be greater than total classes.");
            return;
        }
        if (leave_days < 0) {
            showError("Leave days cannot be negative.");
            return;
        }
        if (attended_during_leave < 0) {
            showError("Attended classes during leave cannot be negative.");
            return;
        }
        if (total_classes <= 0) {
            showError("Total classes must be greater than zero.");
            return;
        }

        let classes_happening = 0;
        let currentDate = new Date(start_date_val);

        // Adjust for timezone differences (to parse date correctly at 00:00 local time)
        // If start_date_val is YYYY-MM-DD, parsing it as new Date("YYYY-MM-DD") creates a UTC date
        // which might be off by a day in local timezone depending on the offset.
        // A safer way is to construct the date locally:
        const [year, month, day] = start_date_val.split('-');
        currentDate = new Date(year, month - 1, day);

        for (let i = 0; i < leave_days; i++) {
            const dayName = daysOfWeek[currentDate.getDay()];
            classes_happening += routine[dayName];
            currentDate.setDate(currentDate.getDate() + 1);
        }

        if (attended_during_leave > classes_happening) {
            showError(`Cannot attend more classes (${attended_during_leave}) than scheduled (${classes_happening}) in this period.`);
            return;
        }

        const missed_classes = classes_happening - attended_during_leave;
        const new_total = total_classes + classes_happening;
        const new_attended = attended_classes + attended_during_leave;

        const current_percentage = total_classes > 0 ? ((attended_classes / total_classes) * 100).toFixed(2) : 0;
        const new_percentage = ((new_attended / new_total) * 100).toFixed(2);

        let endDateObj = new Date(year, month - 1, day);
        if (leave_days > 0) {
            endDateObj.setDate(endDateObj.getDate() + leave_days - 1);
        }

        const startDateFormat = new Date(year, month - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const endDateFormat = endDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        // Update UI
        document.getElementById('new_percentage').textContent = `${new_percentage}%`;
        
        let statusText = 'Danger Zone';
        if (new_percentage >= 75) statusText = 'Safe Zone';
        else if (new_percentage >= 65) statusText = 'Warning Zone';
        
        document.getElementById('attendance_status').textContent = statusText;
        document.getElementById('current_percentage').textContent = `${current_percentage}%`;
        document.getElementById('missed_classes').textContent = missed_classes;

        let missedInfoHtml = `Total classes will become <span class="fw-600">${new_total}</span>, 
            with <span class="fw-600">${new_attended}</span> attended.`;
            
        if (attended_during_leave > 0) {
            missedInfoHtml += `<br><span style="font-size: 0.8rem;">(Includes <span class="fw-600">${attended_during_leave}</span> classes attended during leave)</span>`;
        }
        
        missedInfoHtml += `<br><br>Leave from <span class="fw-600">${startDateFormat}</span> 
            to <span class="fw-600">${endDateFormat}</span> (${leave_days} days).`;

        document.getElementById('missed_info').innerHTML = missedInfoHtml;

        resultCardDiv.style.display = 'block';
        
        setTimeout(() => {
            resultCardDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    });

    function showError(msg) {
        const errDiv = document.getElementById('error-message');
        errDiv.textContent = msg;
        errDiv.style.display = 'block';
        errDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
</script>

</body>
</html>
